<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Games</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #17202a; background: #eef1f5; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; padding: clamp(24px, 6vw, 72px) 20px; background: radial-gradient(circle at 15% 5%, #dceaff, transparent 32rem), linear-gradient(145deg, #f8f7f4, #eef1f5); }
    main { width: min(100%, 880px); margin: auto; }
    h1 { margin: 0; font-size: clamp(2rem, 5vw, 3.25rem); letter-spacing: -.04em; }
    p { margin: .7rem 0 2rem; color: #526171; font-size: 1.1rem; }
    .games { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; }
    a { min-height: 140px; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; border: 1px solid #d7dee7; border-radius: 18px; background: rgba(255,255,255,.92); color: inherit; box-shadow: 0 7px 20px rgba(25,39,55,.08); text-decoration: none; transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease; }
    a:hover, a:focus-visible { transform: translateY(-3px); border-color: #1769d2; box-shadow: 0 14px 30px rgba(25,39,55,.14); outline: none; }
    .name { font-size: 1.35rem; font-weight: 800; letter-spacing: -.025em; }
    .tag { color: #687586; font-weight: 650; }
  </style>
</head>
<body>
  <main>

    <p>Choose a game to play.</p>
    <nav class="games" aria-label="Games">

      <a href="patches.html"><span class="name">Patches</span><span class="tag">Piece it together</span></a>

      <a href="zip.html"><span class="name">Zip</span><span class="tag">Complete the path</span></a>
      <a href="tango.html"><span class="name">Tango</span><span class="tag">Harmonize the grid</span></a>
      <a href="queens.html"><span class="name">Queens</span><span class="tag">Crown each region</span></a>
      <a href="pinpoint.html"><span class="name">Pinpoint</span><span class="tag">Guess the category</span></a>
      <a href="crossclimb.html"><span class="name">Crossclimb</span><span class="tag">Unlock a trivia ladder</span></a>
    </nav>
  </main>
</body>
</html>
